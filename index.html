<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Me</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #fff;
    }
    canvas { display: block; }
    video { display: none; }
    #controls {
      margin-top: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    label {
      color: #444;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }
    input[type=range] { width: 100px; }
  </style>
</head>
<body>

<div id="status">STARTING CAMERA...</div>
<canvas id="out" width="640" height="480"></canvas>
<video id="vid" autoplay playsinline muted></video>

<div id="controls">
  <label>PIXEL SIZE
    <input type="range" id="px" min="1" max="30" step="1" value="5">
  </label>
  <label>BRIGHTNESS
    <input type="range" id="br" min="0.5" max="3" step="0.1" value="1">
  </label>
  <label>CONTRAST
    <input type="range" id="co" min="0.5" max="4" step="0.1" value="1.5">
  </label>
</div>

<script>
  const vid    = document.getElementById('vid');
  const out    = document.getElementById('out');
  const status = document.getElementById('status');
  const ctx    = out.getContext('2d');

  // hidden canvas for RGB sampling
  const tmp    = document.createElement('canvas');
  const tCtx   = tmp.getContext('2d', { willReadFrequently: true });

  let pixelSize  = 5;
  let brightness = 1;
  let contrast   = 1.5;
  let colorR = 255, colorG = 255, colorB = 255;
  let ready = false;

  // camera
  navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    .then(stream => {
      vid.srcObject = stream;
      return vid.play();
    })
    .then(() => {
      status.textContent = '';
      ready = true;
      requestAnimationFrame(draw);
    })
    .catch(err => {
      status.textContent = 'ERROR: ' + err.message;
    });

  function draw() {
    requestAnimationFrame(draw);
    if (!ready || vid.readyState < 2) return;

    const W = out.width;
    const H = out.height;

    // calc how many pixels fit
    const cols = Math.floor(W / pixelSize);
    const rows = Math.floor(H / pixelSize);

    // Sample video into tiny canvas 
    // also (mirrored)
    tmp.width  = cols;
    tmp.height = rows;
    tCtx.save();
    tCtx.scale(-1, 1);
    tCtx.drawImage(vid, -cols, 0, cols, rows);
    tCtx.restore();

    const { data } = tCtx.getImageData(0, 0, cols, rows);

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const i = (row * cols + col) * 4;

        // luminance
        let lum = (0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2]) / 255;

        // calc contrast + brightness
        lum = (lum - 0.5) * contrast + 0.5;
        lum  = Math.max(0, Math.min(1, lum * brightness));

        ctx.fillStyle = `rgb(${Math.round(colorR*lum)},${Math.round(colorG*lum)},${Math.round(colorB*lum)})`;
        ctx.fillRect(col * pixelSize, row * pixelSize, pixelSize - 1, pixelSize - 1);
      }
    }
  }

  // setting controls
  document.getElementById('px').oninput = e => pixelSize  = +e.target.value;
  document.getElementById('br').oninput = e => brightness = +e.target.value;
  document.getElementById('co').oninput = e => contrast   = +e.target.value;
</script>
</body>
</html>
